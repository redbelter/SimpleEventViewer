name: Build and Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
    
    - name: Restore dependencies
      run: dotnet restore
    
    - name: Install ILRepack
      run: dotnet tool install --global ILRepack --version 2.0.36 || Write-Host "ILRepack already installed"
    
    - name: Build solution
      run: dotnet build --no-restore --configuration Release
    
    - name: Run tests
      run: dotnet test --no-build --configuration Release --verbosity normal
    
    - name: Publish application
      run: dotnet publish EventLogViewer/EventLogViewer.csproj --configuration Release --runtime win-x64 /p:PublishSingleFile=true
    
    - name: Repack into single EXE
      run: |
        $publishDir = "EventLogViewer/bin/Release/net8.0-windows/win-x64/publish"
        $exePath = Join-Path $publishDir "EventLogViewer.exe"
        $dllPaths = Get-ChildItem $publishDir -Filter "*.dll" | Select-Object -ExpandProperty FullName
        ilrepack /out:$exePath $exePath ($dllPaths -join ' ')
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: EventLogViewer-build
        path: EventLogViewer/bin/Release/net8.0-windows/win-x64/publish/
        retention-days: 7
