name: Build and Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
    
    - name: Restore dependencies
      run: dotnet restore
    
    - name: Build solution
      run: dotnet build --no-restore --configuration Release
    
    - name: Run tests
      run: dotnet test --no-build --configuration Release --verbosity normal
    
    - name: Publish application
      run: dotnet publish EventLogViewer/EventLogViewer.csproj --configuration Release --runtime win-x64 --self-contained true /p:PublishSingleFile=true
    
    - name: Copy artifacts
      run: |
        if (Test-Path "EventLogViewer/bin/Release/net8.0-windows/win-x64/publish") {
          Copy-Item "EventLogViewer/bin/Release/net8.0-windows/win-x64/publish/*" -Destination "./artifacts/" -Recurse
        }
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: EventLogViewer-build
        path: ./artifacts/
        retention-days: 7
